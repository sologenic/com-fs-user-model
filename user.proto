syntax = "proto3";

package user;

option go_package = "github.com/sologenic/com-fs-user-model;user";

import "google/protobuf/timestamp.proto";
import "sologenic/com-fs-utils-lib/models/metadata/metadata.proto";
import "sologenic/com-fs-utils-lib/models/audit/audit.proto";
import "sologenic/com-fs-utils-lib/models/role/role.proto";
import "sologenic/com-fs-utils-lib/models/language/language.proto";
import "sologenic/com-fs-trade-profile-model/tradeprofile.proto";
import "sologenic/com-fs-document-model/document.proto";
import "user-kyc.proto";
import "user-fundings.proto";
import "sologenic/com-fs-utils-lib/models/commission/commission.proto";
import "sologenic/com-fs-compliance-model/compliance.proto";
import "buf/validate/validate.proto";

message UserDetails {
    // Firebase User ID
    string UserID = 1 [
      (buf.validate.field).string = {
        min_len: 28,
        max_len: 128,
        pattern: "^[a-zA-Z0-9]+$"
      }
    ];

    string FirstName = 2 [
      (buf.validate.field).string = {
        min_len: 2,
        max_len: 64,
        // 1. ^[\\p{L}] – First character must be alpha
        // 2. [\\p{L}\\s\\-']* – Allow alpha, dash (O'Connor), space (Anna Maria), dash (Jean-Baptiste)
        // 3. [\\p{L}]$ – Last character must be alpha
        pattern: "^[\\p{L}][\\p{L}\\s\\-']*[\\p{L}]$"
      }
    ];

    string LastName = 3 [
      // Same logic as for first name
      (buf.validate.field).string = {
        min_len: 2,
        max_len: 64,
        pattern: "^[\\p{L}][\\p{L}\\s\\-']*[\\p{L}]$"
      }
    ];

    string Address = 4 [
      (buf.validate.field).string = {
        max_len: 128
      }
    ];

    string Avatar = 5 [
      (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
      (buf.validate.field).string = {
        uri: true,
        max_len: 256
      }
    ];

    // Nickname
    string Alias = 6 [
      (buf.validate.field).string = {
        min_len: 5,
        max_len: 32,
        pattern: "^[a-zA-Z][a-zA-Z0-9_]*[a-zA-Z0-9]$"
      }
    ];

    string Description = 7 [
      (buf.validate.field).string = {
        max_len: 512
      }
    ];

    UserStatus Status = 8;
    repeated Wallet Wallets = 9;
    repeated Social Socials = 10;
    language.Lang Language = 11;

    // UUID for the external user identifier for example to be used in communication with the KYC provider, or other places where an anonymous ID is required
    string ExternalUserID = 12 [
      (buf.validate.field).string = {
        uuid: true
      }
    ];

    // UUID of the current organization the user belongs to
    string OrganizationID = 13 [
      (buf.validate.field).string = {
        uuid: true
      }
    ];

    optional Employment Employment = 14;
    role.Role Role = 15; // A retail user will always have a role of "NORMAL_USER"
    optional tradeprofile.TradeProfileDetails TradeProfile = 16; // Trade profile details

    // Array of Persona Inquiry IDs
    repeated string KYCInquiries = 17 [
      (buf.validate.field).repeated = {
        max_items: 10,
        items: {
          string: {
            pattern: "^inq_[a-zA-Z0-9]+$",
            min_len: 32,
            max_len: 64
          }
        }
      }
    ];

    UserKYCDetails KYCDetails = 18;
    document.UserDocumentCompliance UserDocumentCompliance = 19;
    KYCStatus KYCStatus = 20; // Status of KYC verification, e.g., PENDING, APPROVED, REJECTED
    optional tradeprofile.UserTradeProfile UserTradeProfile = 21;
    repeated BrokerAccount BrokerAccounts = 23;
    repeated BankAccount BankAccounts = 24 [deprecated = true];
    UISettings UISettings = 25;
    optional commission.CommissionSettings CommissionSettings = 26; // Broker API specific commission fields for user level (overrrides organization level)
    optional DataFeedAccounts DataFeedAccounts = 27;

    // ISO 3166-1 alpha-3 code e.g. "USA", "CAN"
    repeated string AllowedJurisdictions = 28 [
      (buf.validate.field).repeated = {
        max_items: 256,
        items: {
          string: {
            len: 3,
            pattern: "^[A-Z]{3}$"
          }
        }
      }
    ];

    // Email address for the user, often retrieved from the authentication provider
    string EmailAddress = 29 [
      (buf.validate.field).string = {
        email: true,
        max_len: 254
      },
      (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
    ];

    repeated compliance.ComplianceFormAnswer ComplianceFormAnswers = 30; // Compliance answers for the user

    // User ID of the referrer who referred this user during signup or partner code
    optional string ReferredBy = 31 [
      (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
      (buf.validate.field).string = {
        min_len: 3,
        max_len: 128,
        pattern: "^[a-zA-Z0-9_\\-]+$"
      }
    ];

    // Number of referrals made by this user
    optional int32 ReferralCount = 32 [
      (buf.validate.field).int32 = {
        gte: 0
      }
    ];

    // Maximum number of referrals this user can receive (admin override only)
    optional int32 ReferralLimit = 33 [
      (buf.validate.field).int32 = {
        gte: 0
      }
    ];

    // Amount of TX the referring user received from referrals (non-mutable by user)
    optional int32 ReferralAmountReceived = 34 [
      (buf.validate.field).int32 = {
        gte: 0
      }
    ];

    // Amount of TX associated with this user to be distributed to new users (admin override only)
    optional int32 ReferralAmount = 35 [
      (buf.validate.field).int32 = {
        gte: 0
      }
    ];

    optional google.protobuf.Timestamp ReferralPaidAt = 36; // Timestamp when the referral reward was paid
}

message User {
    UserDetails User = 1;
    metadata.MetaData MetaData = 2;
    audit.Audit Audit = 3;

    // If root user: list of organization IDs to which user was cloned. If child user: nil or empty.
    repeated string OrganizationIDs = 4 [
      (buf.validate.field).repeated = {
        items: {
          string: {
            uuid: true
          }
        }
      }
    ];
}

message Social {
    string URL = 1;
    SocialType Type = 2;
}

message UserList {
    repeated User Users = 1;
    optional int32 Offset = 2;
}

message StatusMessage {
    string UserID = 1;
    string OrganizationID = 2;
    UserStatus Status = 3;
    optional metadata.Network Network = 4;
    audit.Audit Audit = 5;
}

enum UserStatus {
    NOT_USED_USERSTATUS = 0;
    ACTIVE = 1;
    ADMIN_DEACTIVATED = 2;
    TO_BE_APPROVED = 3 [deprecated = true];
}

enum SocialType {
    NOT_USED_SOCIALTYPE = 0;
    WEBSITE = 1;
    GITHUB = 2;
    REDDIT = 3;
    DISCORD = 4;
    TWITTER = 5;
    FACEBOOK = 6;
    TELEGRAM = 7;
    INSTAGRAM = 8;
    LINKEDIN = 9;
}

message UISettings {
    Theme Theme = 1;
}

enum Theme {
    NOT_USED_THEME = 0;
    DARK = 1;
    LIGHT = 2;
}

message DataFeedAccounts {
    optional DxFeed DxFeed = 1;
}

message DxFeed {
    string AccountID = 1;
}